<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doulingo</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap">
</head>
<body>
    <div class="container">
        <header>
            <div class="left divScore">
                <h1>Right: <span id="winScore">0</span> </h1>
            </div>
            <div class="right divScore">
                <h1>Wrong: <span id="loseScore">0</span> </h1>
            </div>
        </header>
        <main>
            <h1 id="showTextTH"></h1>
            <h1 id="showTextEN"></h1>
        </main>
        <footer>
            <input type="text" id="inputBox" placeholder="Type Sentence."></input>
        </footer>
    </div>

    <script src="index.js"></script> 

</body>
</html>
